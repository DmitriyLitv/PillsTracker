name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PillsTracker.sln

      - name: Build
        run: dotnet build PillsTracker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PillsTracker.sln --configuration Release --no-build
